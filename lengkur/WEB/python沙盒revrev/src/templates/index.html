<!DOCTYPE html>
<html>
<head>
    <title>Python Sandbox Challenge</title>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 0 auto; padding: 20px; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        .output { background: #f0f0f0; padding: 10px; border-radius: 5px; white-space: pre-wrap; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

    <form id="codeform" action="/code" method="POST">
        <textarea name="code" placeholder="Enter your Python code here...">{{ code }}</textarea>
        <br>
        <input type="submit" value="Run" id="1">
    </form>

    {% if output %}
    <h3>Output:</h3>
    <div class="output">{{ output }}</div>
    {% endif %}

    {% if error %}
    <h3>Error:</h3>
    <div class="error">{{ error }}</div>
    {% endif %}
    <script>
     let bton = document.querySelector("textarea");
     bton.addEventListener("keydown",(e)=>{
       if ( e.key == "Enter" ){
         e.preventDefault();
         document.getElementById("codeform").submit();
       }
     })
    </script>
</body>
</html>
